<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Demo</title>
    <style>
            /* ========== 全局样式 ========== */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
                background-color: #f0f2f5;
                color: #333;
                min-height: 100vh;
            }

            .container {
                max-width: 100%;
                padding: 15px;
            }

            /* ========== 顶部区域：A + B 并排 ========== */
        .top-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 顶部区域：A(上传) + B(展示) -->
    <div class="top-section">
        <!-- A区域：上传 -->
        <div class="panel upload-area">
            <div class="panel-title">
                <span class="icon">A</span>
                素材上传区
            </div>
            <div class="upload-zone" id="uploadZone">
                <div class="icon">📁</div>
                <div class="upload-text">点击或拖拽文件到这里上传</div>
                <div class="upload-hint">支持 JPG / PNG / MP4 / MOV 格式，可同时上传多个文件</div>
                <input type="file" id="fileInput" multiple accept="image/*,video/*">
            </div>
            <div class="upload-file-list" id="uploadFileList"></div>
            <button class="clear-all-btn" id="clearAllBtn" style="display:none;" onclick="clearAllUploads()">清空全部</button>
        </div>

        <!-- B区域：素材展示 -->
        <div class="panel preview-area">
            <div class="panel-title">
                <span class="icon">B</span>
                素材展示区
                <span style="font-size:12px;color:#999;font-weight:400;margin-left:8px;">（拖拽调整顺序，第一个为封面）</span>
            </div>
            <div class="material-grid" id="materialGrid">
                <div class="empty-hint">请从 A 区上传素材</div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
